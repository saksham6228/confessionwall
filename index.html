<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Confession Wall</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">Confession<span>Wall</span></div>
    <p class="nav-tag">100% Anonymous</p>
  </nav>

  <header class="page-header">
    <p class="eyebrow">Say What You Really Think</p>
    <h1>Campus Confession Wall</h1>
    <p class="sub">Post anything, anonymously. Upvote the confessions that hit closest to home.</p>
  </header>

  <div class="banner" id="statusBanner" role="alert" aria-live="polite"></div>

  <!-- POST FORM -->
  <section class="section post-section">
    <h2>Share a Confession</h2>
    <form id="confessionForm" novalidate>
      <div class="form-group">
        <label for="content">Your Confession</label>
        <textarea id="content" rows="3" placeholder="Type something you've never told anyone..." maxlength="500"></textarea>
        <div class="char-count"><span id="charCount">0</span> / 500</div>
        <span class="field-error" id="contentError"></span>
      </div>
      <div class="form-group">
        <label for="category">Category</label>
        <select id="category">
          <option value="Random">Random</option>
          <option value="Campus Life">Campus Life</option>
          <option value="Love">Love</option>
          <option value="Academics">Academics</option>
        </select>
      </div>
      <button type="submit" class="btn-primary" id="submitBtn">
        <span id="btnText">Post Anonymously</span>
        <span class="spinner" id="spinner"></span>
      </button>
    </form>
  </section>

  <!-- CONFESSION FEED -->
  <section class="section feed-section">
    <div class="feed-header">
      <h2>The Wall</h2>
      <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="Campus Life">Campus Life</option>
        <option value="Love">Love</option>
        <option value="Academics">Academics</option>
        <option value="Random">Random</option>
      </select>
    </div>

    <p class="loading-text" id="loadingText">Loading confessions...</p>
    <div class="confession-list" id="confessionList"></div>
  </section>

  <footer class="footer">
    <p>&copy; 2026 Campus Confession Wall &mdash; Built for learning full-stack basics.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
